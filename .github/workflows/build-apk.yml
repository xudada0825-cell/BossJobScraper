name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossJobScraper-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish Release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          TAG=v1.0
          REPO=${{ github.repository }}

          # Delete existing release and tag so we can recreate cleanly
          RELEASE_ID=$(gh api repos/$REPO/releases/tags/$TAG --jq .id 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            gh api --method DELETE repos/$REPO/releases/$RELEASE_ID
          fi
          gh api --method DELETE repos/$REPO/git/refs/tags/$TAG 2>/dev/null || true

          sleep 2

          # Create fresh release
          gh release create "$TAG" "$APK" \
            --title "外贸招聘监控 APK" \
            --notes "外贸招聘监控，支持21城市筛选，3分钟自动刷新。\n\n点击下方 app-debug.apk 下载安装。" \
            --latest

          echo "APK URL: https://github.com/$REPO/releases/download/$TAG/app-debug.apk"
