name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossJobScraper-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Always update the same fixed release (v1.0) so the download link never changes
      - name: Update fixed Release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          TAG=v1.0
          REPO=${{ github.repository }}

          # Get or create the release
          RELEASE=$(gh release view "$TAG" --json id,uploadUrl 2>/dev/null || echo "")
          if [ -z "$RELEASE" ]; then
            gh release create "$TAG" \
              --title "外贸招聘监控 APK" \
              --notes "Boss直聘外贸招聘监控，支持21城市筛选，5分钟自动刷新。" \
              --latest
          fi

          # Delete existing APK asset (if any) and re-upload
          gh release delete-asset "$TAG" app-debug.apk --yes 2>/dev/null || true
          gh release upload "$TAG" "$APK#app-debug.apk" --clobber
          echo "Release updated: https://github.com/$REPO/releases/download/$TAG/app-debug.apk"
