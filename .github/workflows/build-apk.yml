name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossJobScraper-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Update fixed Release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          TAG=v1.0
          REPO=${{ github.repository }}

          # Create release if it doesn't exist
          gh release view "$TAG" 2>/dev/null || gh release create "$TAG" \
            --title "外贸招聘监控 APK" \
            --notes "外贸招聘监控，支持21城市筛选，3分钟自动刷新。" \
            --latest

          # Upload with --clobber to overwrite existing asset
          gh release upload "$TAG" "$APK" --clobber
          echo "Release updated: https://github.com/$REPO/releases/download/$TAG/app-debug.apk"
